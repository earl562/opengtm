name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-root:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            opengtm-crm/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Contradiction audit
        run: npm run audit:contradictions

      - name: Canonical externalization eval
        run: node packages/cli/bin/opengtm.js evals run canonical

      - name: Export canonical CI artifacts
        run: npm run report:canonical:ci

      - name: Upload canonical CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-ci-artifacts
          path: reports/ci/**
          retention-days: 14

      - name: Pack check
        run: npm run pack:check

      - name: CLI install smoke
        run: npm run smoke:install:cli

  validate-crm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            opengtm-crm/package-lock.json

      - name: Install CRM dependencies
        working-directory: opengtm-crm
        run: npm ci

      - name: Typecheck CRM
        working-directory: opengtm-crm
        run: npm run typecheck

      - name: Test CRM
        working-directory: opengtm-crm
        run: npm test

      - name: Build CRM
        working-directory: opengtm-crm
        run: npm run build
