name: Security Audit

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            opengtm-crm/package-lock.json

      - name: Install
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: CRM npm audit (high+)
        working-directory: opengtm-crm
        run: npm audit --audit-level=high
