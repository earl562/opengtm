name: Bug report
description: Something is broken or incorrect
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Provide the smallest steps needed to reproduce.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Node version, OS, and any relevant config.
    validations:
      required: true
